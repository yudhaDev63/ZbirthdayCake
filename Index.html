<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- Background -->
<div class="sky">

    <div id="stars"></div>
    <div id="shooting-stars"></div>

</div>

<!-- Glow -->
<div id="lightGlow"></div>

<!-- Container -->

<div class="container">

    <h1 class="title">
        Selamat Ulang Tahun🥳
    </h1>

    <p class="subtitle">
        Tekan dan tahan selama <b>3 detik</b><br>
        untuk meniup lilin
    </p>

    <!-- Cake -->

    <div class="cake-scene">

        <div class="cake">

            <!-- Top -->
            <div class="cake-top">

                <div class="icing"></div>

                <!-- Candle -->
                <div class="candle">

                    <div class="wick"></div>

                    <div class="flame">

                        <span class="core"></span>
                        <span class="inner"></span>
                        <span class="outer"></span>

                    </div>

                    <div class="smoke"></div>

                </div>

            </div>

            <!-- Side -->
            <div class="cake-side"></div>

            <!-- Shadow -->
            <div class="cake-shadow"></div>

        </div>

    </div>

    <!-- Hold Progress -->

    <div class="progress">

        <div id="progressBar"></div>

    </div>

</div>

<!-- Fireworks -->
<div id="fireworks"></div>

<!-- Confetti -->
<div id="confetti"></div>

<!-- Message -->

<div id="birthdayMessage">

    🎉 Selamat Ulang Tahun Cipay 🎉

</div>

<script src="particles.js"></script>
<script src="fireworks.js"></script>
<script src="script.js"></script>

</body>

</html>
